<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لوحة متابعة المخططات</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  direction: rtl;
  overflow: hidden;
  background: #f3f4f6;
}

#header {
  background: #245f2a;
  color: white;
  text-align: center;
  padding: 14px;
  font-size: 18px;
  font-weight: bold;
}

#loginOverlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

#loginBox {
  background: white;
  padding: 24px;
  border-radius: 12px;
  width: 90%;
  max-width: 360px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

#loginBox input,
#loginBox button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  font-size: 16px;
  box-sizing: border-box;
}

#loginBox button {
  background: #245f2a;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

#errorMsg {
  color: #b91c1c;
  margin-top: 12px;
  min-height: 20px;
}

#mapContainer {
  position: absolute;
  top: 52px;
  left: 0;
  right: 0;
  bottom: 0;
  display: none;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<div id="header">لوحة متابعة مخططات التصريف والاعتمادات</div>

<div id="loginOverlay">
  <div id="loginBox">
    <h3>تسجيل الدخول</h3>
    <input id="username" placeholder="اسم المستخدم">
    <input id="password" type="password" placeholder="كلمة المرور">
    <button onclick="checkLogin()">دخول</button>
    <div id="errorMsg"></div>
  </div>
</div>

<div id="mapContainer">
  <iframe id="mapFrame"></iframe>
</div>

<script>
const USERS = [
  { username: "admin", password: "123" },
  { username: "manager", password: "111" },
  { username: "engineer", password: "222" }
];

function checkLogin() {
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();

  const ok = USERS.find(x => x.username === u && x.password === p);

  if (!ok) {
    document.getElementById("errorMsg").textContent = "اسم المستخدم أو كلمة المرور غير صحيحة";
    return;
  }

  sessionStorage.setItem("loggedIn", "1");
  showMap();
}

function showMap() {
  document.getElementById("loginOverlay").style.display = "none";
  document.getElementById("mapContainer").style.display = "block";
  document.getElementById("mapFrame").src = "map/index.html";
}

window.onload = function () {
  if (sessionStorage.getItem("loggedIn") === "1") {
    showMap();
  }
};
</script>

</body>
</html>
